name: hrm-sudoku

resources:
  cloud: kubernetes
  cpus: 8
  memory: 64
  accelerators: H100:8
  disk_size: 100
  image_id: nvcr.io/nvidia/pytorch:26.02-py3
  # kueue labels and PVC mount (/nemo-workspace) are in ~/.sky/config.yaml

num_nodes: 1

envs:
  WANDB_API_KEY: ""
  WANDB_ENTITY: "LoopTF-4-CSPs"
  OMP_NUM_THREADS: 8

workdir: .

setup: |
  set -ex
  echo "=== HRM Sudoku Training Setup ==="

  # NGC image provides PyTorch, CUDA toolkit, and flash-attn
  # adam-atan2 needs CUDA compilation from source (PyPI wheel lacks CUDA extensions)
  pip install git+https://github.com/imoneoi/adam-atan2.git --no-build-isolation
  pip install -r requirements.txt

  # Build dataset on PVC (persists across runs) and symlink into workdir
  DATA_PVC=/nemo-workspace/inf-evolve/hrm/data/sudoku-hard-full
  if [ -f "$DATA_PVC/train/dataset.json" ]; then
    echo "=== Dataset already exists on PVC, skipping build ==="
  else
    echo "=== Building Sudoku dataset on PVC ==="
    python dataset/build_sudoku_dataset.py \
      --output-dir "$DATA_PVC"
  fi
  mkdir -p data
  ln -sfn "$DATA_PVC" data/sudoku-hard-full

  echo "=== Setup complete ==="

run: |
  set -ex
  echo "=== HRM Sudoku Training ==="

  nvidia-smi --query-gpu=name,memory.total --format=csv

  # W&B fallback to offline if no key
  if [ -z "${WANDB_API_KEY:-}" ]; then
    unset WANDB_API_KEY
    export WANDB_MODE=offline
    echo "W&B offline mode"
  fi

  export PYTHONUNBUFFERED=1

  torchrun --nproc-per-node 8 \
    pretrain.py \
    experiment=${HRM_EXPERIMENT:-sdk_full_lr3e4_Lc8}
